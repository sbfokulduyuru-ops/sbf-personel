<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SBF ADMİN - KONTROL PANELİ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #1e3a8a; }
        .no-print { display: block; }
        @media print {
            .no-print, nav, #lock, .timer-wrapper, #timer, .grid, input, select, button, .border-t, .fa-solid { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .bg-white { box-shadow: none !important; border: none !important; width: 100% !important; border-radius: 0 !important; }
            table { border-collapse: collapse !important; width: 100% !important; margin: 0 !important; border: 1px solid #000 !important; }
            th, td, td div, td span { 
                border: 1px solid #000 !important; padding: 4px 6px !important; 
                font-family: Arial, Helvetica, sans-serif !important; 
                font-size: 12pt !important; color: black !important;
                background: transparent !important; font-weight: bold !important;
                line-height: 1.4 !important; text-transform: uppercase !important;
                font-style: normal !important; text-align: center !important;
            }
            td div { font-size: 12pt !important; }
            td:first-child, td:first-child div { text-align: left !important; }
            .tip-hucre { border: none !important; padding: 0 !important; background: transparent !important; color: black !important; box-shadow: none !important; font-size: 12pt !important; }
        }
        .tight-row td { padding: 0.25rem 1.5rem !important; }
        .code-display { text-shadow: 0 10px 15px rgba(0,0,0,0.05); letter-spacing: 0.1em; }
        .login-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }
        #timerContainer { transition: width 2.1s linear, background-color 0.5s ease; width: 100%; height: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 9999px; }
        .timer-wrapper { width: 100%; max-width: 400px; background-color: rgba(255, 255, 255, 0.1); border-radius: 9999px; margin: 0 auto 2rem auto; position: relative; }
        #timer { display: block; font-weight: 900; font-style: italic; margin-bottom: 8px; text-transform: uppercase; font-size: 1.25rem; transition: color 0.5s ease; }
    </style>
</head>
<body class="min-h-screen" onload="checkAuth()">
    <div id="lock" class="fixed inset-0 z-[999] bg-[#1e3a8a] flex items-center justify-center p-4 no-print">
        <div class="login-card p-10 w-full max-w-sm text-center">
            <div class="flex justify-center mb-6"><div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg"><i class="fa-solid fa-lock"></i></div></div>
            <h2 class="text-xl font-black mb-8 uppercase tracking-tight text-slate-800">SBF İŞKUR ÖĞRENCİ KONTROL PANELİ GİRİŞİ</h2>
            <div class="space-y-4">
                <input type="password" id="pw" placeholder="Sistem Şifresi" class="w-full p-4 border border-blue-100 rounded-2xl outline-none text-center font-bold bg-blue-50/30 focus:border-blue-400 transition-all">
                <button onclick="login()" class="w-full bg-[#3b82f6] text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest hover:bg-blue-600 transition-all">SİSTEMİ AÇ</button>
            </div>
        </div>
    </div>
    <div id="main" class="hidden bg-slate-100 min-h-screen">
        <nav class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm no-print">
            <div class="flex items-center gap-4"><div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-bolt"></i></div><h1 class="font-black text-slate-900 uppercase text-lg tracking-tighter leading-none">SBF PERSONEL TAKİP</h1></div>
            <div class="hidden lg:flex items-center gap-6 border-x px-8 border-slate-100"><div id="liveClock" class="text-xl font-black text-slate-800 leading-none tabular-nums">...</div></div>
            <div class="flex gap-3"><button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl text-xs font-black uppercase flex items-center gap-2 shadow-lg transition-all hover:bg-black"><i class="fa-solid fa-print"></i> PDF / YAZDIR</button><button onclick="logout()" class="bg-red-50 text-red-500 p-2.5 rounded-xl hover:bg-red-100 transition-all"><i class="fa-solid fa-power-off"></i></button></div>
        </nav>
        <div class="p-6 w-full max-w-[100%] mx-auto">
            <div class="bg-white rounded-[3.5rem] p-16 text-center mb-10 border border-slate-200 shadow-2xl relative overflow-hidden no-print">
                <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-blue-600 to-indigo-600"></div>
                <div class="flex flex-col items-center justify-center"><span id="timer" class="no-print">...</span><div class="timer-wrapper no-print"><div id="timerContainer"></div></div><p class="text-[14px] font-black text-slate-400 uppercase tracking-[0.5em] mb-4">AKTİF GÜVENLİK KODU</p><div id="kod" class="text-[11rem] leading-none font-black text-slate-900 code-display">000000</div></div>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10 no-print">
                <div class="bg-white rounded-[2.5rem] p-10 border-l-[12px] border-slate-300 shadow-sm"><p class="text-[14px] font-black text-slate-400 mb-3">TOPLAM</p><div id="statTotal" class="text-7xl font-black text-slate-800">0</div></div>
                <div class="bg-white rounded-[2.5rem] p-10 border-l-[12px] border-emerald-500 shadow-sm"><p class="text-[14px] font-black text-emerald-500 mb-3">GİRİŞ</p><div id="statIn" class="text-7xl font-black text-emerald-600">0</div></div>
                <div class="bg-white rounded-[2.5rem] p-10 border-l-[12px] border-rose-500 shadow-sm"><p class="text-[14px] font-black text-rose-500 mb-3">ÇIKIŞ</p><div id="statOut" class="text-7xl font-black text-rose-600">0</div></div>
                <div class="bg-blue-600 rounded-[2.5rem] p-10 text-white shadow-xl shadow-blue-200"><p class="text-[14px] font-black opacity-80 mb-3">İÇERİDE</p><div id="statPresent" class="text-7xl font-black">0</div></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 no-print">
                <input type="text" id="araInput" onkeyup="tabloyuFiltrele()" placeholder="İsim ara..." class="p-5 bg-white border border-slate-200 rounded-3xl outline-none font-bold text-lg shadow-sm">
                <input type="date" id="tarihInput" onchange="tabloyuFiltrele()" class="p-5 bg-white border border-slate-200 rounded-3xl outline-none font-bold text-lg shadow-sm">
                <select id="tipInput" onchange="tabloyuFiltrele()" class="p-5 bg-white border border-slate-200 rounded-3xl font-black uppercase text-sm cursor-pointer shadow-sm"><option value="">TÜMÜ</option><option value="GİRİŞ">GİRİŞ</option><option value="ÇIKIŞ">ÇIKIŞ</option></select>
                <button onclick="filtreTemizle()" class="bg-white border border-slate-200 p-5 rounded-3xl font-black text-xs uppercase text-slate-400 hover:text-blue-600 transition-all flex items-center justify-center gap-2 shadow-sm"><i class="fa-solid fa-filter-circle-xmark"></i> SIFIRLA</button>
            </div>
            <div class="bg-white rounded-[3rem] shadow-xl overflow-hidden border border-slate-200 mb-20">
                <table id="anaTablo" class="w-full text-left border-collapse"><thead class="bg-slate-50 text-slate-500 text-xs font-black uppercase border-b"><tr><th class="p-6">PERSONEL ADI</th><th class="p-6 text-center">TARİH</th><th class="p-6 text-center">SAAT</th><th class="p-6 text-center">İŞLEM</th><th class="p-6 text-center no-print text-red-500 w-12">SİL</th></tr></thead><tbody id="tabloBody" class="font-bold text-slate-700 italic text-sm"></tbody></table>
                <div class="p-8 border-t border-slate-50 text-center no-print"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">© 2026 SBF Bilgi İşlem Birimi - Tüm Hakları Saklıdır.</p></div>
            </div>
        </div>
    </div>
    <script>
        const sURL = "https://script.google.com/macros/s/AKfycbzHsifMaIBYD39c1DH_mNpLsvOHM-jwmDvX1CL7x7Fe6TMSAmNVWd2ou5bifUln4cBqUQ/exec";
        
        // --- TÜRKİYE YEREL TARİHİNİ ALAN FONKSİYON ---
        function getTRDate() {
            const now = new Date();
            const trNow = new Date(now.getTime() + (3 * 60 * 60 * 1000)); // GMT+3 Ayarı
            return trNow.toISOString().split('T')[0];
        }

        function checkAuth() { 
            if (sessionStorage.getItem('admin_session') === 'active') { 
                document.getElementById('lock').classList.add('hidden'); 
                document.getElementById('main').classList.remove('hidden'); 
                
                const trToday = getTRDate();
                document.getElementById('tarihInput').value = trToday;
                document.getElementById('tarihInput').setAttribute('max', trToday); 
                
                baslat(); updateClock(); 
            } 
        }

        function updateClock() { 
            const now = new Date(); 
            const gunler = ["PAZAR", "PAZARTESİ", "SALI", "ÇARŞAMBA", "PERŞEMBE", "CUMA", "CUMARTESİ"]; 
            const aylar = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"]; 
            const tarihStr = `${now.getDate()} ${aylar[now.getMonth()]} ${now.getFullYear()} - ${gunler[now.getDay()]} - ${now.toLocaleTimeString('tr-TR')}`; 
            document.getElementById('liveClock').innerText = tarihStr;

            // GECE 00:00 KONTROLÜ (Otomatik Yeni Gün Geçişi)
            if (now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) {
                const trToday = getTRDate();
                document.getElementById('tarihInput').value = trToday;
                document.getElementById('tarihInput').setAttribute('max', trToday);
                verileriCek();
            }
            setTimeout(updateClock, 1000); 
        }

        function login() { if (document.getElementById('pw').value === "12345") { sessionStorage.setItem('admin_session', 'active'); checkAuth(); } else alert("Hata!"); }
        function logout() { sessionStorage.removeItem('admin_session'); location.reload(); }
        function baslat() { verileriCek(); setInterval(verileriCek, 2000); }

        function verileriCek() {
            fetch(sURL + "?v=" + new Date().getTime()).then(res => res.json()).then(data => {
                if(data.secureKey) {
                    let cleanCode = (parseInt(data.secureKey.toString()) % 1000000).toString().padStart(6, '0');
                    if(document.getElementById('kod').innerText !== cleanCode) document.getElementById('kod').innerText = cleanCode;
                }
                let now = new Date().getTime();
                let kalanMS = 30000 - (now % 30000);
                let kalanSN = Math.ceil(kalanMS / 1000);
                let oran = kalanMS / 30000;
                let colorRGB = `rgb(${Math.floor(239 * (1 - oran))}, ${Math.floor(197 * oran)}, ${Math.floor(94 * oran)})`;
                document.getElementById('timer').innerText = kalanSN + " SN KALDI";
                document.getElementById('timer').style.color = colorRGB;
                document.getElementById('timerContainer').style.width = (oran * 100) + "%";
                document.getElementById('timerContainer').style.backgroundColor = colorRGB;
                if (data.records) {
                    const bBody = document.getElementById('tabloBody'); bBody.innerHTML = "";
                    data.records.reverse().forEach(r => {
                        const renk = r.type === 'GİRİŞ' ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 'text-rose-600 bg-rose-50 border-rose-100';
                        bBody.innerHTML += `<tr class="tight-row border-b hover:bg-blue-50/30 transition-all"><td><div class="uppercase text-2xl font-black text-slate-800">${r.name}</div></td><td class="text-center"><span class="tarih-hucre">${r.date}</span></td><td class="text-center">${r.time}</td><td class="text-center"><span class="tip-hucre px-8 py-3 rounded-2xl text-sm font-black border ${renk}">${r.type}</span></td><td class="text-center no-print"><button onclick="kayitSil('${r.id}')" class="text-slate-300 hover:text-red-500 p-3"><i class="fa-solid fa-trash-can text-xl"></i></button></td></tr>`;
                    });
                    tabloyuFiltrele();
                }
            });
        }

        function tabloyuFiltrele() {
            const isim = document.getElementById("araInput").value.toUpperCase();
            const tip = document.getElementById("tipInput").value.toUpperCase();
            const takvim = document.getElementById("tarihInput").value;
            let fTarih = takvim ? takvim.split("-").reverse().join(".") : "";
            const tr = document.getElementById("tabloBody").getElementsByTagName("tr");
            let t=0, iC=0, oC=0;
            for (let i = 0; i < tr.length; i++) {
                const sTarih = tr[i].querySelector(".tarih-hucre") ? tr[i].querySelector(".tarih-hucre").innerText : "";
                const sTip = tr[i].querySelector(".tip-hucre") ? tr[i].querySelector(".tip-hucre").innerText : "";
                if ((tr[i].innerText.toUpperCase().indexOf(isim)>-1) && (fTarih==="" || sTarih===fTarih) && (tip==="" || sTip===tip)) {
                    tr[i].style.display = ""; t++; if(sTip==="GİRİŞ") iC++; if(sTip==="ÇIKIŞ") oC++;
                } else tr[i].style.display = "none";
            }
            document.getElementById('statTotal').innerText = t; document.getElementById('statIn').innerText = iC;
            document.getElementById('statOut').innerText = oC; document.getElementById('statPresent').innerText = (iC-oC);
        }

        function filtreTemizle() { 
            document.getElementById("araInput").value=""; 
            const trToday = getTRDate();
            document.getElementById("tarihInput").value = trToday; 
            document.getElementById("tipInput").value=""; 
            tabloyuFiltrele(); 
        }

        function kayitSil(id) {
            if(confirm("Silinsin mi?")) {
                const s = document.createElement('script'); const cName = 'del_cb_'+Math.floor(Math.random()*1e6);
                window[cName] = function(d) { if(d.result==="OK") verileriCek(); delete window[cName]; document.body.removeChild(s); };
                s.src = sURL + "?action=sil&id=" + id + "&callback=" + cName; document.body.appendChild(s);
            }
        }
    </script>
</body>
</html>
