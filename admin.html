<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SBF ADMİN - KONTROL PANELİ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #1e3a8a; }
        .no-print { display: block; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .admin-card { border: none; box-shadow: none; max-width: 100% !important; }
        }
        /* Satır boşlukları senin istediğin gibi dar tutuldu */
        .tight-row td { padding: 0.25rem 1.5rem !important; }
        .code-display { text-shadow: 0 10px 15px rgba(0,0,0,0.05); letter-spacing: 0.1em; }
        .login-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }
        #timerContainer { transition: background-color 1s linear; }
    </style>
</head>
<body class="min-h-screen" onload="checkAuth()">

    <div id="lock" class="fixed inset-0 z-[999] bg-[#1e3a8a] flex items-center justify-center p-4 no-print">
        <div class="login-card p-10 w-full max-w-sm text-center">
            <div class="flex justify-center mb-6">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg">
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>
            <h2 class="text-xl font-black mb-8 uppercase tracking-tight text-slate-800">SBF İŞKUR ÖĞRENCİ KONTROL PANELİ GİRİŞİ</h2>
            <div class="space-y-4">
                <input type="password" id="pw" placeholder="Sistem Şifresi" class="w-full p-4 border border-blue-100 rounded-2xl outline-none text-center font-bold bg-blue-50/30 focus:border-blue-400 transition-all">
                <button onclick="login()" class="w-full bg-[#3b82f6] text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest hover:bg-blue-600 transition-all">SİSTEMİ AÇ</button>
            </div>
        </div>
    </div>

    <div id="main" class="hidden bg-slate-100 min-h-screen">
        <nav class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm no-print">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-bolt"></i></div>
                <div>
                    <h1 class="font-black text-slate-900 uppercase text-lg tracking-tighter leading-none">SBF PERSONEL TAKİP</h1>
                </div>
            </div>
            
            <div class="hidden lg:flex items-center gap-6 border-x px-8 border-slate-100">
                <span id="liveDate" class="text-lg font-black text-blue-500 uppercase tracking-wider"></span>
                <div id="liveClock" class="text-3xl font-black text-slate-800 leading-none tabular-nums border-l-2 border-slate-200 pl-6">00:00:00</div>
            </div>

            <div class="flex gap-3">
                <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl text-xs font-black uppercase flex items-center gap-2 shadow-lg transition-all hover:bg-black">
                    <i class="fa-solid fa-print"></i> PDF / YAZDIR
                </button>
                <button onclick="logout()" class="bg-red-50 text-red-500 p-2.5 rounded-xl hover:bg-red-100 transition-all"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <div class="p-6 w-full max-w-[100%] mx-auto">
            <div class="bg-white rounded-[3.5rem] p-16 text-center mb-10 border border-slate-200 shadow-2xl shadow-blue-900/5 relative overflow-hidden no-print">
                <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-blue-600 to-indigo-600"></div>
                <div class="flex flex-col items-center justify-center">
                    <div id="timerContainer" class="text-white font-black px-16 py-4 rounded-full text-2xl mb-8 italic shadow-xl transition-all duration-1000">
                        <span id="timer">30 SN KALDI</span>
                    </div>
                    <p class="text-[14px] font-black text-slate-400 uppercase tracking-[0.5em] mb-4">AKTİF GÜVENLİK KODU</p>
                    <div id="kod" class="text-[11rem] leading-none font-black text-slate-900 code-display">000000</div>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10 no-print">
                <div class="bg-white rounded-[2.5rem] p-10 border-l-[12px] border-slate-300 shadow-sm">
                    <p class="text-[14px] font-black text-slate-400 uppercase tracking-widest mb-3">TOPLAM HAREKET</p>
                    <div id="statTotal" class="text-7xl font-black text-slate-800">0</div>
                </div>
                <div class="bg-white rounded-[2.5rem] p-10 border-l-[12px] border-emerald-500 shadow-sm">
                    <p class="text-[14px] font-black text-emerald-500 uppercase tracking-widest mb-3">GİRİŞ SAYISI</p>
                    <div id="statIn" class="text-7xl font-black text-emerald-600">0</div>
                </div>
                <div class="bg-white rounded-[2.5rem] p-10 border-l-[12px] border-rose-500 shadow-sm">
                    <p class="text-[14px] font-black text-rose-500 uppercase tracking-widest mb-3">ÇIKIŞ SAYISI</p>
                    <div id="statOut" class="text-7xl font-black text-rose-600">0</div>
                </div>
                <div class="bg-blue-600 rounded-[2.5rem] p-10 text-white shadow-xl shadow-blue-200">
                    <p class="text-[14px] font-black opacity-80 uppercase tracking-widest mb-3">İÇERİDEKİ PERSONEL</p>
                    <div id="statPresent" class="text-7xl font-black">0</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 no-print">
                <input type="text" id="araInput" onkeyup="tabloyuFiltrele()" placeholder="İsim ara..." class="p-5 bg-white border border-slate-200 rounded-3xl outline-none focus:border-blue-500 font-bold text-lg shadow-sm">
                <input type="date" id="tarihInput" onchange="tabloyuFiltrele()" class="p-5 bg-white border border-slate-200 rounded-3xl outline-none focus:border-blue-500 font-bold text-lg shadow-sm">
                <select id="tipInput" onchange="tabloyuFiltrele()" class="p-5 bg-white border border-slate-200 rounded-3xl outline-none focus:border-blue-500 font-black text-sm uppercase shadow-sm cursor-pointer">
                    <option value="">TÜM HAREKETLER</option>
                    <option value="GİRİŞ">SADECE GİRİŞLER</option>
                    <option value="ÇIKIŞ">SADECE ÇIKIŞLAR</option>
                </select>
                <button onclick="filtreTemizle()" class="bg-white border border-slate-200 p-5 rounded-3xl font-black text-xs uppercase text-slate-400 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-filter-circle-xmark"></i> FİLTREYİ SIFIRLA
                </button>
            </div>

            <div class="bg-white rounded-[3rem] shadow-xl overflow-hidden border border-slate-200 mb-20">
                <table id="anaTablo" class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-500 text-xs font-black uppercase border-b border-slate-100">
                        <tr>
                            <th class="p-6">PERSONEL ADI</th>
                            <th class="p-6 text-center">TARİH</th>
                            <th class="p-6 text-center">SAAT</th>
                            <th class="p-6 text-center">İŞLEM</th>
                            <th class="p-6 text-center no-print text-red-500 w-12">SİL</th>
                        </tr>
                    </thead>
                    <tbody id="tabloBody" class="font-bold text-slate-700 italic text-sm">
                        <tr><td colspan="5" class="p-20 text-center text-slate-300 font-black uppercase tracking-widest animate-pulse text-xl">Veriler Getiriliyor...</td></tr>
                    </tbody>
                </table>
                
                <div class="p-8 border-t border-slate-50 text-center no-print">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        © 2026 SBF Bilgi İşlem Birimi - Tüm Hakları Saklıdır.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sURL = "https://script.google.com/macros/s/AKfycbzHsifMaIBYD39c1DH_mNpLsvOHM-jwmDvX1CL7x7Fe6TMSAmNVWd2ou5bifUln4cBqUQ/exec";

        function checkAuth() {
            if (sessionStorage.getItem('admin_session') === 'active') {
                document.getElementById('lock').classList.add('hidden');
                document.getElementById('main').classList.remove('hidden');
                baslat();
                updateClock();
            }
        }

        function updateClock() {
            const now = new Date();
            const days = ["PAZAR", "PAZARTESİ", "SALI", "ÇARŞAMBA", "PERŞEMBE", "CUMA", "CUMARTESİ"];
            const months = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('tr-TR');
            document.getElementById('liveDate').innerText = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} | ${days[now.getDay()]}`;
            setTimeout(updateClock, 1000);
        }

        function login() {
            const p = document.getElementById('pw').value;
            // Eski sistemdeki gibi sadece şifre: 12345
            if (p === "12345") {
                sessionStorage.setItem('admin_session', 'active');
                checkAuth();
            } else { alert("Şifre Hatalı!"); }
        }

        function logout() { sessionStorage.removeItem('admin_session'); location.reload(); }

        function baslat() {
            setInterval(function() {
                let s = new Date().getTime();
                let k = 30 - Math.floor((s % 30000) / 1000);
                let kalan = (k == 0 ? 30 : k);
                document.getElementById('timer').innerText = kalan + " SN KALDI";
                let oran = (30 - kalan) / 29; 
                let r = Math.floor(74 + (239 - 74) * oran);
                let g = Math.floor(222 + (68 - 222) * oran);
                let b = Math.floor(128 + (68 - 128) * oran);
                document.getElementById('timerContainer').style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
                if (k % 5 === 0) verileriCek();
            }, 1000);
            verileriCek();
        }

        function verileriCek() {
            fetch(sURL + "?v=" + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    if(data.secureKey) document.getElementById('kod').innerText = data.secureKey;
                    const b = document.getElementById('tabloBody');
                    b.innerHTML = "";
                    if (data.records && data.records.length > 0) {
                        data.records.reverse().forEach(r => {
                            const renk = r.type === 'GİRİŞ' ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 'text-rose-600 bg-rose-50 border-rose-100';
                            b.innerHTML += `
                                <tr class="tight-row border-b border-slate-50 hover:bg-blue-50/30 transition-all">
                                    <td><div class="uppercase text-2xl font-black text-slate-800 tracking-tighter">${r.name}</div></td>
                                    <td class="text-center"><div class="text-lg text-blue-500 font-black"><i class="fa-regular fa-calendar mr-1"></i><span class="tarih-hucre">${r.date}</span></div></td>
                                    <td class="text-center"><div class="text-lg text-blue-500 font-black"><i class="fa-regular fa-clock mr-1"></i>${r.time}</div></td>
                                    <td class="text-center"><span class="tip-hucre px-8 py-3 rounded-2xl text-sm font-black border ${renk} shadow-sm uppercase">${r.type}</span></td>
                                    <td class="text-center no-print"><button onclick="kayitSil('${r.id}')" class="text-slate-300 hover:text-red-500 transition-all p-3"><i class="fa-solid fa-trash-can text-xl"></i></button></td>
                                </tr>`;
                        });
                        tabloyuFiltrele();
                    }
                });
        }

        function tabloyuFiltrele() {
            const isimFiltre = document.getElementById("araInput").value.toUpperCase();
            const tipFiltre = document.getElementById("tipInput").value.toUpperCase();
            const takvimDegeri = document.getElementById("tarihInput").value;
            let formatliTarih = "";
            if(takvimDegeri) {
                const parcalar = takvimDegeri.split("-");
                formatliTarih = parcalar[2] + "." + parcalar[1] + "." + parcalar[0];
            }
            const tr = document.getElementById("tabloBody").getElementsByTagName("tr");
            let total = 0, inCount = 0, outCount = 0;
            for (let i = 0; i < tr.length; i++) {
                const metin = tr[i].textContent || tr[i].innerText;
                const satirTarihi = tr[i].querySelector(".tarih-hucre") ? tr[i].querySelector(".tarih-hucre").innerText : "";
                const satirTipi = tr[i].querySelector(".tip-hucre") ? tr[i].querySelector(".tip-hucre").innerText : "";
                const isimUyuyor = metin.toUpperCase().indexOf(isimFiltre) > -1;
                const tarihUyuyor = formatliTarih === "" || satirTarihi === formatliTarih;
                const tipUyuyor = tipFiltre === "" || satirTipi === tipFiltre;
                if (isimUyuyor && tarihUyuyor && tipUyuyor) {
                    tr[i].style.display = "";
                    total++;
                    if(satirTipi === "GİRİŞ") inCount++;
                    if(satirTipi === "ÇIKIŞ") outCount++;
                } else {
                    tr[i].style.display = "none";
                }
            }
            document.getElementById('statTotal').innerText = total;
            document.getElementById('statIn').innerText = inCount;
            document.getElementById('statOut').innerText = outCount;
            document.getElementById('statPresent').innerText = (inCount - outCount);
        }

        function filtreTemizle() {
            document.getElementById("araInput").value = "";
            document.getElementById("tarihInput").value = "";
            document.getElementById("tipInput").value = "";
            tabloyuFiltrele();
        }

        function kayitSil(id) {
            if(confirm("Bu kayıt kalıcı olarak silinsin mi?")) {
                const script = document.createElement('script');
                const callbackName = 'del_cb_' + Math.floor(Math.random() * 1000000);
                window[callbackName] = function(data) {
                    if(data.result === "OK") {
                        verileriCek();
                    } else {
                        alert("Hata: Kayıt silinemedi!");
                    }
                    delete window[callbackName];
                    document.body.removeChild(script);
                };
                script.src = sURL + "?action=sil&id=" + id + "&callback=" + callbackName;
                document.body.appendChild(script);
            }
        }
    </script>
</body>
</html>
